services:
  mkdocs:
    image: squidfunk/mkdocs-material:latest
    container_name: mkdocs_live
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    # 'serve' starts the live server
    # '--dev-addr 0.0.0.0:8000' makes it accessible on your network
    command: >
      sh -c "mkdocs build --clean && python -m http.server 8000 --directory site"
    restart: unless-stopped