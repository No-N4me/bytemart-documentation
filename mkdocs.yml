site_name: Bytemart Documentation
site_url: https://bytemart.com
theme:
  name: material
  logo: assets/bytemart_logo.png    # The main logo in the header navigation
  favicon: assets/bytemart_logo.png # The tiny icon in the browser tab
  palette:
    # Ensure MkDocs starts natively in Slate mode so other dark options map closely 
    - scheme: slate 
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/bytemart.css
